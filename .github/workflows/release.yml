name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: ./scripts/bundle.sh

      - name: Zip app
        run: ditto -c -k --keepParent UsageBar.app "UsageBar-${GITHUB_REF_NAME}.zip"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "UsageBar-${GITHUB_REF_NAME}.zip" \
            --title "UsageBar ${GITHUB_REF_NAME}" \
            --generate-notes
